<!DOCTYPE html>
<html>
<head>
    <title>SonicStream - Triple Screen</title>
    <style>
        body { background: #000; color: #00ff00; font-family: monospace; text-align: center; margin: 0; padding: 10px; }
        .section { border: 2px solid #00ff00; padding: 10px; margin-bottom: 20px; border-radius: 10px; background: #0a0a0a; }
        input, select { width: 85%; padding: 10px; background: #000; color: #00ff00; border: 1px solid #00ff00; margin: 5px; }
        button { background: #00ff00; color: #000; border: none; padding: 10px 15px; font-weight: bold; cursor: pointer; border-radius: 5px; margin: 5px; }
        
        /* LAYAR 2: GAME */
        #layar-game { width: 100%; height: 120px; background: #000; position: relative; border-bottom: 3px solid #00ff00; overflow: hidden; margin: 10px 0; }
        #kanguru { width: 30px; height: 40px; background: #00ff00; position: absolute; bottom: 0; left: 20px; }
        #rintangan { width: 20px; height: 30px; background: red; position: absolute; bottom: 0; right: -20px; animation: jalan 2s infinite linear; }
        .jump-p { animation: jp 0.5s ease-out; }
        .jump-t { animation: jt 0.8s ease-out; }
        @keyframes jp { 0%, 100% { bottom: 0; } 50% { bottom: 50px; } }
        @keyframes jt { 0%, 100% { bottom: 0; } 50% { bottom: 100px; } }
        @keyframes jalan { 0% { right: -20px; } 100% { right: 100%; } }
    </style>
</head>
<body>

    <div class="section">
        <h3>[ LAYAR 1: MUSIK & DATA ]</h3>
        <input type="text" id="linkYt" placeholder="Tempel URL Musik YouTube...">
        <button onclick="simpan('music')">SIMPAN</button>
        <div id="listMusic" style="font-size: 11px; text-align: left; height: 50px; overflow-y: auto;"></div>
    </div>

    <div class="section">
        <h3>[ LAYAR 2: KANGAROO JUMP ]</h3>
        <div id="layar-game">
            <div id="kanguru"></div>
            <div id="rintangan"></div>
        </div>
        <button onclick="lompat('p')">Lompat Pendek</button>
        <button onclick="lompat('t')">Lompat Tinggi</button>
    </div>

    <div class="section" style="border-color: #00ffff;">
        <h3 style="color: #00ffff;">[ LAYAR 3: SONIC CINEMA ]</h3>
        <p style="font-size: 10px;">Pilih Video dari HP atau YouTube:</p>
        
        <input type="file" id="upFile" accept="video/*" style="border-color: #00ffff;">
        <button onclick="gasVideo('local')" style="background: #00ffff;">UPLOAD VIDEO</button>
        <hr style="border: 0.5px solid #004444;">
        <input type="text" id="linkVid" placeholder="Link YouTube Video..." style="border-color: #00ffff;">
        <button onclick="gasVideo('yt')" style="background: #00ffff;">NONTON YT</button>

        <div id="panggung-video" style="margin-top: 15px; display: none;">
            <div id="box-vid"></div>
        </div>
    </div>

    <script>
        // Logika Musik
        function simpan(type) {
            let val = document.getElementById('linkYt').value;
            if(val) {
                let d = JSON.parse(localStorage.getItem('sonic_m')) || [];
                d.push(val);
                localStorage.setItem('sonic_m', JSON.stringify(d));
                muat();
            }
        }
        function muat() {
            let d = JSON.parse(localStorage.getItem('sonic_m')) || [];
            document.getElementById('listMusic').innerHTML = d.map((u, i) => `<div>🎵 ${i+1}. <button onclick="window.open('${u}','_blank')">PUTAR</button></div>`).join('');
        }
        muat();

        // Logika Game
        function lompat(j) {
            let k = document.getElementById('kanguru');
            let cls = j === 'p' ? 'jump-p' : 'jump-t';
            k.classList.add(cls);
            setTimeout(() => k.classList.remove(cls), j === 'p' ? 500 : 800);
        }

        // Logika Layar 3 (Video Cinema)
        function gasVideo(mode) {
            let box = document.getElementById('box-vid');
            document.getElementById('panggung-video').style.display = 'block';
            
            if(mode === 'local') {
                let file = document.getElementById('upFile').files[0];
                if(file) {
                    let url = URL.createObjectURL(file);
                    box.innerHTML = `<video width="100%" controls src="${url}" style="border: 2px solid #00ffff;"></video>`;
                }
            } else {
                let url = document.getElementById('linkVid').value;
                let id = url.includes('v=') ? url.split('v=')[1].split('&')[0] : url.split('youtu.be/')[1];
                if(id) {
                    box.innerHTML = `<iframe width="100%" height="200" src="https://www.youtube.com/embed/${id}" frameborder="0" allowfullscreen></iframe>`;
                }
            }
        }
    </script>
</body>
</html>
