<!DOCTYPE html>
<html>
<head>
    <title>SonicStream Dashboard v3</title>
    <style>
        body { background: #000; color: #00ff00; font-family: monospace; text-align: center; margin: 0; padding: 10px; }
        
        /* Navigasi Utama */
        .nav-master { position: sticky; top: 0; background: #000; padding: 10px; border-bottom: 2px solid #00ff00; z-index: 100; display: flex; justify-content: space-around; }
        .nav-btn { background: transparent; color: #00ff00; border: 1px solid #00ff00; padding: 5px 10px; cursor: pointer; font-size: 12px; }
        .active { background: #00ff00; color: #000; }

        .section { display: none; padding: 20px; border: 1px solid #00ff00; margin-top: 10px; border-radius: 10px; }
        .show { display: block; }

        /* Game Style */
        #layar-game { width: 100%; height: 120px; background: #000; position: relative; border-bottom: 3px solid #00ff00; overflow: hidden; }
        #kanguru { width: 30px; height: 40px; background: #00ff00; position: absolute; bottom: 0; left: 20px; }
        #rintangan { width: 20px; height: 30px; background: red; position: absolute; bottom: 0; right: -20px; animation: jalan 2s infinite linear; }
        @keyframes jalan { 0% { right: -20px; } 100% { right: 100%; } }
        .jump { animation: j 0.5s ease-out; }
        @keyframes j { 0%, 100% { bottom: 0; } 50% { bottom: 80px; } }
    </style>
</head>
<body>

    <div class="nav-master">
        <button class="nav-btn active" onclick="bukaLayar(1, this)">1. MUSIK</button>
        <button class="nav-btn" onclick="bukaLayar(2, this)">2. GAME</button>
        <button class="nav-btn" onclick="bukaLayar(3, this)" style="border-color: #00ffff; color: #00ffff;">3. CINEMA</button>
    </div>

    <div id="L1" class="section show">
        <h3>[ LAYAR 1: PENYIMPANAN MUSIK ]</h3>
        <input type="text" id="inM" placeholder="Link YouTube..." style="width:80%; padding:10px; background:#000; color:#00ff00; border:1px solid #00ff00;">
        <button onclick="saveM()" style="margin-top:10px; padding:10px; background:#00ff00; color:#000; border:none; font-weight:bold;">SIMPAN</button>
        <div id="listM" style="text-align:left; margin-top:10px;"></div>
    </div>

    <div id="L2" class="section">
        <h3>[ LAYAR 2: KANGAROO JUMP ]</h3>
        <div id="layar-game">
            <div id="kanguru"></div>
            <div id="rintangan"></div>
        </div>
        <button onclick="lompat()" style="width:100%; padding:20px; background:#00ff00; color:#000; font-weight:bold; margin-top:10px;">LOMPAT!</button>
    </div>

    <div id="L3" class="section" style="border-color: #00ffff;">
        <h3 style="color: #00ffff;">[ LAYAR 3: SONIC CINEMA ]</h3>
        <p>Upload video dari HP Master:</p>
        <input type="file" id="upV" accept="video/*" style="color:#00ffff;">
        <button onclick="playV()" style="background:#00ffff; color:#000; border:none; padding:10px; font-weight:bold; margin-top:10px;">TAMPILKAN VIDEO</button>
        <div id="vBox" style="margin-top:15px;"></div>
    </div>

    <script>
        function bukaLayar(n, btn) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('show'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('L' + n).classList.add('show');
            btn.classList.add('active');
        }

        function saveM() {
            let val = document.getElementById('inM').value;
            if(val) {
                let d = JSON.parse(localStorage.getItem('sm')) || [];
                d.push(val);
                localStorage.setItem('sm', JSON.stringify(d));
                muatM();
            }
        }

        function muatM() {
            let d = JSON.parse(localStorage.getItem('sm')) || [];
            document.getElementById('listM').innerHTML = d.map((u, i) => `<div>🎵 ${i+1} <button onclick="window.open('${u}')">PUTAR</button></div>`).join('');
        }

        function lompat() {
            let k = document.getElementById('kanguru');
            if(!k.classList.contains('jump')) {
                k.classList.add('jump');
                setTimeout(() => k.classList.remove('jump'), 500);
            }
        }

        function playV() {
            let f = document.getElementById('upV').files[0];
            if(f) {
                let u = URL.createObjectURL(f);
                document.getElementById('vBox').innerHTML = `<video width="100%" controls src="${u}" style="border:2px solid #00ffff;"></video>`;
            }
        }
        muatM();
    </script>
</body>
</html>
